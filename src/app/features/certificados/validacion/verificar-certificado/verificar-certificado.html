      <div class="main-container">
        <div class="validation-container">

            <!-- TÍTULO -->
            <div class="validation-title">validar certificado</div>

            <!-- CAMPO + BOTÓN -->
            <div class="input-group">
                <input type="text" class="input-codigo" id="codigoCertificado" placeholder="Código del certificado" maxlength="20" #codigoInput>
                <button class="btn-validar" (click)="validarCertificado(codigoInput.value)">validar</button>
            </div>

            <!-- LABEL DE VISTA PREVIA -->
            <div class="preview-label" [style.display]="certificadoValido ? 'block' : 'none'">
                Vista previa del certificado
            </div>

            <!-- CONTENEDOR DEL CERTIFICADO -->
            <div class="certificado-container" [style.display]="certificadoValido ? 'block' : 'none'">
                <div class="certificado" [innerHTML]="certificadoHTML"></div>
            </div>

            <!-- MENSAJE DE ERROR -->
            <div class="error-message" [style.display]="mostrarError ? 'block' : 'none'">
                el certificado no se encontró
            </div>

        </div>
    </div>
