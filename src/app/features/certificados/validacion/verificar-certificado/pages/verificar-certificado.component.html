<!-- Indicadores de pasos -->
<div class="steps-indicator">
  <div class="step-wrapper" [class.completed]="isStepCompleted(1)">
    <div class="step-indicator"
         [class.active]="isStepActive(1)"
         [class.completed]="isStepCompleted(1)"
         (click)="goToStep(1)">
      <div class="step-number">1</div>
    </div>
    <p class="step-label">Ingresar código</p>
  </div>

  <div class="step-wrapper" [class.completed]="isStepCompleted(2)">
    <div class="step-indicator"
         [class.active]="isStepActive(2)"
         [class.completed]="isStepCompleted(2)"
         [class.disabled]="!isStepCompleted(1)"
         (click)="isStepCompleted(1) ? goToStep(2) : null">
      <div class="step-number">2</div>
    </div>
    <p class="step-label">Resultado</p>
  </div>
</div>

<!-- Contenido de los pasos -->
<div class="wizard-content">
  <!-- Paso 1: Validar código -->
  <div class="step-content" [class.active]="isStepActive(1)">
    <app-validar-codigo 
      (codigoIngresado)="onCodigoIngresado($event)"
      [verificando]="verificando">
    </app-validar-codigo>
    
    <div class="error-message" [class.visible]="mostrarError">
      {{ mensajeError }}
    </div>
  </div>

  <!-- Paso 2: Mostrar resultado -->
  <div class="step-content" [class.active]="isStepActive(2)">
    <app-mostrar-resultado
      [certificadoData]="certificadoData"
      [certificadoHTML]="certificadoHTML"
      [esValido]="certificadoValido"
      [downloadUrl]="downloadUrl"
      (volver)="volverABuscar()">
    </app-mostrar-resultado>
  </div>
</div>

<!-- Modal de selección de carrera -->
<div class="modal-overlay" *ngIf="mostrarModalCarreras" (click)="cerrarModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h3 style="color: #ff8800; text-align: center; margin-bottom: 20px;">Seleccione una carrera</h3>
    <p style="margin-bottom: 20px; text-align: center;">El certificado contiene información de múltiples programas. Seleccione el programa del cual desea ver el certificado.</p>
    
    <div class="form-group">
      <label for="carrera">Programa académico <span class="required">*</span></label>
      <select id="carrera" [(ngModel)]="carreraElegida" name="carrera">
        <option value="">Seleccione una carrera...</option>
        <option *ngFor="let programa of programasDisponibles" [value]="programa.snies">
          {{ programa.nombre }}
        </option>
      </select>
    </div>

    <div class="buttons-container" style="display: flex; gap: 10px; margin-top: 20px;">
      <button type="button" class="btn btn-secondary" (click)="cerrarModal()" style="flex: 1;">Cancelar</button>
      <button type="button" class="btn btn-primary" (click)="seleccionarCarrera(certificadoData?.hash || '')" [disabled]="!carreraElegida" style="flex: 1;">Aceptar</button>
    </div>
  </div>
</div>
