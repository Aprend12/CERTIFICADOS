<!-- Indicadores de pasos -->
<div class="steps-indicator">
  <div class="step-wrapper" [class.completed]="isStepCompleted(1)">
    <div class="step-indicator"
         [class.active]="isStepActive(1)"
         [class.completed]="isStepCompleted(1)"
         (click)="goToStep(1)">
      <div class="step-number">1</div>
    </div>
    <p class="step-label">Ingresar código</p>
  </div>

  <div class="step-wrapper" [class.completed]="isStepCompleted(2)">
    <div class="step-indicator"
         [class.active]="isStepActive(2)"
         [class.completed]="isStepCompleted(2)"
         [class.disabled]="!isStepCompleted(1)"
         (click)="isStepCompleted(1) ? goToStep(2) : null">
      <div class="step-number">2</div>
    </div>
    <p class="step-label">Resultado</p>
  </div>
</div>

<!-- Contenido de los pasos -->
<div class="wizard-content">
  <!-- Step 1: Validate code -->
  <div class="step-content" [class.active]="isStepActive(1)">
    <app-validar-codigo 
      (codigoIngresado)="onCodigoIngresado($event)"
      [verificando]="verificando">
    </app-validar-codigo>
    
    <div class="error-message" [class.visible]="mostrarError">
      {{ mensajeError }}
    </div>
  </div>

  <!-- Step 2: Show certificate -->
  <div class="step-content" [class.active]="isStepActive(2)">
    <div class="resultado-container">
      
      <!-- Preview del certificado -->
      <div class="preview-section">
        <div class="cert-stage">
          <div class="cert-frame">
            <div class="cert-scroll-area">
              <div *ngIf="cargandoPdf" class="loading">
                Cargando certificado...
              </div>
              <iframe
                *ngIf="pdfSrc && !cargandoPdf"
                [src]="pdfSrc"
                class="pdf-iframe"
                title="Certificado">
              </iframe>
              <div *ngIf="!certificadoValido && !cargandoPdf" class="no-pdf">
                No se pudo cargar el certificado
              </div>
            </div>
          </div>
          <div class="cert-info-strip">
            <span>📄</span>
            <span>Tamaño real: Carta (21.59 × 27.94 cm)</span>
            <span>·</span>
            <span>PDF listo para imprimir</span>
          </div>
        </div>
      </div>

      <!-- Botones -->
      <div class="buttons-container">
        <button 
          type="button" 
          class="btn btn-primary" 
          (click)="descargarCertificado()"
          [disabled]="descargando">
          {{ descargando ? 'Descargando...' : 'Descargar Certificado' }}
        </button>
        
        <button 
          type="button" 
          class="btn btn-secondary" 
          (click)="volverABuscar()">
          Buscar otro certificado
        </button>
      </div>

    </div>
  </div>
</div>
