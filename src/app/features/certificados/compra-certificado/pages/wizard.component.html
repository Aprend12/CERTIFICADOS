<div class="steps-indicator">

  <div class="step-wrapper">
    <div class="step-indicator"
        [class.active]="isStepActive(1)"
        [class.completed]="isStepCompleted(1)"
        [class.disabled]="!canAccessStep(1)"
        (click)="canAccessStep(1) ? setStep(1) : null"
        [attr.title]="getStepTitle(1)">
      <div class="step-number">1</div>
    </div>
    <p class="step-label">Datos</p>
  </div>

  <div class="step-wrapper">
    <div class="step-indicator"
        [class.active]="isStepActive(2)"
        [class.completed]="isStepCompleted(2)"
        [class.disabled]="!canAccessStep(2) || !wizardService.isPrevStepCompleted(2)"
        (click)="canAccessStep(2) && wizardService.isPrevStepCompleted(2) ? setStep(2) : null"
        [attr.title]="getStepTitle(2)">
      <div class="step-number">2</div>
    </div>
    <p class="step-label">Previsualizar</p>
  </div>

  <div class="step-wrapper">
    <div class="step-indicator"
        [class.active]="isStepActive(3)"
        [class.completed]="isStepCompleted(3)"
        [class.disabled]="!canAccessStep(3) || !wizardService.isPrevStepCompleted(3)"
        (click)="canAccessStep(3) && wizardService.isPrevStepCompleted(3) ? setStep(3) : null"
        [attr.title]="getStepTitle(3)">
      <div class="step-number">3</div>
    </div>
    <p class="step-label">Pagar</p>
  </div>

  <div class="step-wrapper">
    <div class="step-indicator"
        [class.active]="isStepActive(4)"
        [class.completed]="isStepCompleted(4)"
        [class.disabled]="!canAccessStep(4) || !wizardService.isPrevStepCompleted(4)"
        (click)="canAccessStep(4) && wizardService.isPrevStepCompleted(4) ? setStep(4) : null"
        [attr.title]="getStepTitle(4)">
      <div class="step-number">4</div>
    </div>
    <p class="step-label">Descargar</p>
  </div>
</div>
<!-- Contenido de los pasos -->

  <!-- Paso 1: Datos -->
    <div class="wizard-content-1">
  <div class="step-content" [class.active]="isStepActive(1)">
    <app-step-datos (datosSubmitted)="onDatosSubmitted($event)"></app-step-datos>
  </div>

  <!-- Paso 2: Preview - Datos y Preview lado a lado -->
  <div class="step-content step-preview" [class.active]="isStepActive(2)">
    <div class="preview-layout">
      <!-- Panel izquierdo: Datos del certificado (solo lectura) -->
      <div class="content-medio">
        <div class="form-group">
          <label for="nombre_completo">Nombre completo</label>
          <input type="text" id="nombre_completo" name="nombre_completo" [value]="datosUsuario.nombre_completo || 'Sin datos'" readonly placeholder="Sin datos">
        </div>
        <div class="form-group">
          <label for="documento_identidad">Documento de identidad</label>
          <input type="text" id="documento_identidad" name="documento_identidad" [value]="datosUsuario.documento || 'Sin datos'" readonly placeholder="Sin datos">
        </div>
        <div class="form-group">
          <label for="numero_estudiante">Número de estudiante</label>
          <input type="text" id="numero_estudiante" name="numero_estudiante" [value]="datosUsuario.codigo_estudiante || 'Sin datos'" readonly placeholder="Sin datos">
        </div>
        <div class="form-group">
          <label for="certificado_preview">Tipo de certificado</label>
          <input type="text" id="certificado_preview" name="certificado_preview" [value]="getCertificadoTitulo()" readonly placeholder="Sin datos">
        </div>
      </div>

      <!-- Panel derecho: Preview -->
      <div class="caja__preview">
        <app-step-preview
          [certificadoHTML]="getCertificadoHTML()">
        </app-step-preview>
      </div>
    </div>
    <div style="text-align: center; margin-top: 20px; width: 100%; display: flex; justify-content: center; gap: 10px;">
      <button class="btn btn-secondary" (click)="setStep(1)">Atrás</button>
      <button class="btn btn-primary" (click)="continuarDesdePreview()">Continuar</button>
    </div>
  </div>

  <!-- Paso 3: Pagar -->
  <div class="step-content" [class.active]="isStepActive(3)">
    <app-step-pagos (goToDownload)="onPagoCompletado($event)" [nombreCertificado]="getCertificadoTitulo()" [hashCode]="datosUsuario.hash_code || ''" [documentoEstudiante]="datosUsuario.documento || ''"></app-step-pagos>
  </div>

  <!-- Paso 4: Descargar -->
  <div class="step-content" [class.active]="isStepActive(4)">
    <app-step-descarga [datos]="datosUsuario"></app-step-descarga>
  </div>
</div>
