<!-- step-descarga.component.html -->
<div class="step-descarga">

  <div class="form-container">

    <!-- Vista previa del certificado -->
    <div class="preview-section">
      <h3 class="preview-title">Vista Previa</h3>
      <div class="cert-stage">
        <div class="cert-frame">
          <div class="cert-scroll-area">
            <div class="cert-scaler">
              <div class="cert-content" [innerHTML]="certificadoFinalSafe"></div>
            </div>
          </div>
        </div>
        <div class="cert-info-strip">
          <span>📄</span>
          <span>Tamaño real: Carta (21.59 × 27.94 cm)</span>
          <span>·</span>
          <span>PDF listo para imprimir</span>
        </div>
      </div>
    </div>

    <!-- Download button -->
    <div class="buttons-container">
      <button type="button" class="btn btn-primary" (click)="descargar()" [disabled]="generando || descargado">
        {{ descargado ? 'Descargado' : (generando ? 'Descargando...' : 'Descargar Certificado') }}
      </button>
    </div>

    <!-- Mensaje de error -->
    <div class="error-message" *ngIf="error">
      {{ error }}
    </div>

  </div>

</div>
