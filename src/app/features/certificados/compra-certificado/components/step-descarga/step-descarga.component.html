<div class="caja__preview">
      <h1 class="title">Certificado Generado</h1>
      <div class="certificado-wrapper">
        <div class="certificado" #certificadoEl [innerHTML]="certificadoFinalSafe"></div>
      </div>
    </div>

    <div class="btn-container" style="display: flex; justify-content: center; gap: 10px;">
      <button class="btn-descargar" (click)="descargar()" [disabled]="generando || descargado">
        {{ descargado ? 'Descargado' : (generando ? 'Descargando...' : (fileName ? 'Descargar '+fileName : 'Descargar Certificado')) }}
      </button>
    </div>
